{% extends "admin_portal/base.html" %}

{% block page_title %}Reset Password{% endblock %}

{% block content %}
<div class="mb-6">
    <a href="{% url 'admin_nurse_list' %}" class="flex items-center gap-2 text-on-surface-variant hover:text-primary transition-colors font-medium">
        <span class="material-symbols-outlined text-sm">arrow_back</span>
        Back to Nurses
    </a>
</div>

<div class="bg-surface-container-lowest rounded-2xl shadow-sm border border-outline-variant/30 p-8 max-w-md mx-auto">
    <div class="w-16 h-16 bg-primary/10 text-primary rounded-full flex items-center justify-center mb-6">
        <span class="material-symbols-outlined text-3xl">key</span>
    </div>
    
    <h2 class="text-headline-sm font-bold text-on-surface mb-2">Reset Password</h2>
    <p class="text-body-md text-on-surface-variant mb-6">
        Reset password for <strong>{{ nurse.user.get_full_name|default:nurse.employee_id }}</strong> ({{ nurse.employee_id }}).
    </p>
    
    <form method="post" class="space-y-6">
        {% csrf_token %}
        <div>
            <label class="block text-label-md text-on-surface-variant font-semibold mb-2">New Password <span class="text-error">*</span></label>
            <input type="password" name="new_password" required class="w-full px-4 py-3 bg-surface-container border border-outline-variant rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-shadow text-body-md" placeholder="Enter new password">
        </div>
        
        <div class="flex justify-end gap-3 pt-2">
            <a href="{% url 'admin_nurse_list' %}" class="px-6 py-2.5 rounded-xl border border-outline-variant text-on-surface hover:bg-surface-container-low transition-colors font-medium">Cancel</a>
            <button type="submit" class="px-6 py-2.5 bg-primary text-white rounded-xl font-medium hover:bg-primary-container shadow-sm hover:shadow transition-all">
                Reset Password
            </button>
        </div>
    </form>
</div>
{% endblock %}
