{% extends "admin_portal/base.html" %}

{% block page_title %}{% if food %}Edit Food{% else %}Add New Food{% endif %}{% endblock %}

{% block content %}
<div class="mb-6">
    <a href="{% if food %}{% url 'admin_food_detail' food.pk %}{% else %}{% url 'admin_food_list' %}{% endif %}" class="flex items-center gap-2 text-on-surface-variant hover:text-primary transition-colors font-medium">
        <span class="material-symbols-outlined text-sm">arrow_back</span>
        Back
    </a>
</div>

<div class="bg-surface-container-lowest rounded-2xl shadow-sm border border-outline-variant/30 p-8 max-w-3xl">
    <form method="post" enctype="multipart/form-data" class="space-y-6">
        {% csrf_token %}
        
        <div>
            <label class="block text-label-md text-on-surface-variant font-semibold mb-2">Food Name <span class="text-error">*</span></label>
            <input type="text" name="name" value="{{ food.name|default:'' }}" required class="w-full px-4 py-3 bg-surface-container-lowest border border-outline-variant rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-shadow text-body-md" placeholder="Enter food name">
        </div>

        <div>
            <label class="block text-label-md text-on-surface-variant font-semibold mb-2">Food Image</label>
            {% if food.image_url %}
            <div class="mb-3">
                <img src="{{ food.image_url }}" alt="Current Image" class="h-32 rounded-lg border border-outline-variant/30 object-cover">
            </div>
            {% endif %}
            <input type="file" name="image" accept="image/*" class="w-full px-4 py-3 bg-surface-container-lowest border border-outline-variant rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-shadow text-body-md file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-primary/10 file:text-primary hover:file:bg-primary/20 cursor-pointer">
            <p class="text-xs text-on-surface-variant mt-1">Leave empty to keep the current image.</p>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
                <label class="block text-label-md text-on-surface-variant font-semibold mb-2">HD Status</label>
                <select name="hd_status" class="w-full px-4 py-3 bg-surface-container-lowest border border-outline-variant rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-shadow text-body-md">
                    <option value="aman" {% if food.hd_status == 'aman' %}selected{% endif %}>Aman</option>
                    <option value="batasi" {% if food.hd_status == 'batasi' %}selected{% endif %}>Batasi</option>
                    <option value="hindari" {% if food.hd_status == 'hindari' %}selected{% endif %}>Hindari</option>
                </select>
            </div>
            
            <div>
                <label class="block text-label-md text-on-surface-variant font-semibold mb-2">Estimated Fluid (ml)</label>
                <input type="number" name="estimated_fluid_ml" value="{{ food.estimated_fluid_ml|default:'0' }}" min="0" class="w-full px-4 py-3 bg-surface-container-lowest border border-outline-variant rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-shadow text-body-md">
            </div>
            
            <div>
                <label class="block text-label-md text-on-surface-variant font-semibold mb-2">Calories (kcal)</label>
                <input type="number" name="calories" value="{{ food.calories|default:'0' }}" min="0" class="w-full px-4 py-3 bg-surface-container-lowest border border-outline-variant rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-shadow text-body-md">
            </div>
            
            <div>
                <label class="block text-label-md text-on-surface-variant font-semibold mb-2">Protein (g)</label>
                <input type="number" step="0.1" name="protein" value="{{ food.protein|default:'0' }}" min="0" class="w-full px-4 py-3 bg-surface-container-lowest border border-outline-variant rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-shadow text-body-md">
            </div>
            
            <div>
                <label class="block text-label-md text-on-surface-variant font-semibold mb-2">Sodium / Natrium (mg)</label>
                <input type="number" name="sodium" value="{{ food.sodium|default:'0' }}" min="0" class="w-full px-4 py-3 bg-surface-container-lowest border border-outline-variant rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-shadow text-body-md">
            </div>
            
            <div>
                <label class="block text-label-md text-on-surface-variant font-semibold mb-2">Potassium / Kalium (mg)</label>
                <input type="number" name="potassium" value="{{ food.potassium|default:'0' }}" min="0" class="w-full px-4 py-3 bg-surface-container-lowest border border-outline-variant rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-shadow text-body-md">
            </div>
            
            <div>
                <label class="block text-label-md text-on-surface-variant font-semibold mb-2">Phosphorus / Fosfor (mg)</label>
                <input type="number" name="phosphorus" value="{{ food.phosphorus|default:'0' }}" min="0" class="w-full px-4 py-3 bg-surface-container-lowest border border-outline-variant rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-shadow text-body-md">
            </div>
        </div>
        
        <div>
            <label class="block text-label-md text-on-surface-variant font-semibold mb-2">Description / Notes</label>
            <textarea name="description" rows="4" class="w-full px-4 py-3 bg-surface-container-lowest border border-outline-variant rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-shadow text-body-md">{{ food.description|default:'' }}</textarea>
        </div>
        
        <div class="flex justify-end gap-3 pt-6 border-t border-outline-variant/30">
            <a href="{% if food %}{% url 'admin_food_detail' food.pk %}{% else %}{% url 'admin_food_list' %}{% endif %}" class="px-6 py-2.5 rounded-xl border border-outline-variant text-on-surface hover:bg-surface-container-low transition-colors font-medium">Cancel</a>
            <button type="submit" class="px-6 py-2.5 bg-primary text-white rounded-xl font-medium hover:bg-primary-container shadow-sm hover:shadow transition-all">
                {% if food %}Save Changes{% else %}Create Food{% endif %}
            </button>
        </div>
    </form>
</div>
{% endblock %}
